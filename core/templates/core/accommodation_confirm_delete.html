{% extends 'base.html' %}

{% block title %}Brisanje prilagodbe – AAC Tim 4{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="mb-3">Brisanje prilagodbe</h2>
                <p>Jeste li sigurni da želite obrisati ovu prilagodbu za studenta <strong>{{ object.student.full_name }}</strong>?</p>
                <p class="text-muted">Ova akcija je nepovratna.</p>

                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'core:accommodation_detail' object.pk %}" class="btn btn-secondary">Odustani</a>
                    <button type="submit" class="btn btn-danger">Obriši prilagodbu</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
